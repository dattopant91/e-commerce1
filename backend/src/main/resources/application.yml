server:
  port: 8080

spring:
  application:
    name: ecommerce-monolith
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ecommerce_monolith?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret: c3VwZXItc2VjcmV0LWtleS1mb3ItZWNvbW1lcmNlLW1vbm9saXRoLXByb2plY3Qtc2VjdXJpdHktMTIzNDU2Nzg5MA==
  expiration: 86400000 # 24 hours
